name: Build ASEAN PPT artifact

on:
  workflow_dispatch:

jobs:
  build-ppt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-pptx pillow

      - name: Build PPT from slides_content.md
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          from pptx import Presentation
          from pptx.util import Inches, Pt
          from pptx.enum.text import PP_ALIGN
          from pptx.dml.color import RGBColor

          ROOT = Path(".")
          slides_md = ROOT / "slides_content.md"
          assets_dir = ROOT / "assets"
          output_dir = ROOT / "output"
          output_dir.mkdir(exist_ok=True)

          chinese_name = output_dir / "东盟十国衡器法制计量监管体系及发展情况_配图初稿.pptx"
          english_name = output_dir / "ASEAN_PPT_draft.pptx"

          if not slides_md.exists():
              raise FileNotFoundError("未找到 slides_content.md，无法生成 PPT。")

          text = slides_md.read_text(encoding="utf-8-sig")

          parts = re.split(r"\n(?=## 第\d+页)", text)
          slides = []
          for part in parts:
              part = part.strip()
              if not part.startswith("## 第"):
                  continue

              lines = [x.strip() for x in part.splitlines() if x.strip()]
              title_line = lines[0]
              title = re.sub(r"^##\s*第\d+页[｜|]\s*", "", title_line).strip()

              points = []
              notes = []
              in_points = False
              in_notes = False

              for line in lines[1:]:
                  if "页面核心要点" in line:
                      in_points = True
                      in_notes = False
                      continue
                  if "讲述提示" in line:
                      in_points = False
                      in_notes = True
                      continue
                  if line.startswith("---"):
                      continue

                  clean = re.sub(r"^\-\s*", "", line).strip()
                  clean = clean.replace("**", "")

                  if in_points and clean:
                      points.append(clean)
                  elif in_notes and clean:
                      notes.append(clean)

              slides.append({
                  "title": title,
                  "points": points[:5],
                  "notes": notes[:3],
              })

          if not slides:
              raise RuntimeError("slides_content.md 中没有识别到“## 第X页”格式的页面。")

          prs = Presentation()
          prs.slide_width = Inches(13.333)
          prs.slide_height = Inches(7.5)

          blank = prs.slide_layouts[6]

          image_map = {
              2: "slide02_market_weighing_compliance.png",
              3: "slide03_asean_composite_market.png",
              4: "slide04_weighing_compliance_chain.png",
              6: "slide06_three_regulatory_models.png",
              10: "slide10_central_local_execution.png",
              13: "slide13_risk_layering.png",
              15: "slide15_oiml_technical_language.png",
          }

          def add_textbox(slide, x, y, w, h, text, size=24, bold=False, color=(30, 30, 30)):
              box = slide.shapes.add_textbox(Inches(x), Inches(y), Inches(w), Inches(h))
              tf = box.text_frame
              tf.clear()
              p = tf.paragraphs[0]
              run = p.add_run()
              run.text = text
              font = run.font
              font.name = "Microsoft YaHei"
              font.size = Pt(size)
              font.bold = bold
              font.color.rgb = RGBColor(*color)
              return box

          def add_bullets(slide, x, y, w, h, points):
              box = slide.shapes.add_textbox(Inches(x), Inches(y), Inches(w), Inches(h))
              tf = box.text_frame
              tf.word_wrap = True
              tf.clear()

              for idx, point in enumerate(points):
                  p = tf.paragraphs[0] if idx == 0 else tf.add_paragraph()
                  p.text = point
                  p.level = 0
                  p.font.name = "Microsoft YaHei"
                  p.font.size = Pt(20)
                  p.space_after = Pt(8)
              return box

          for idx, item in enumerate(slides, start=1):
              slide = prs.slides.add_slide(blank)

              # 顶部标题
              add_textbox(slide, 0.6, 0.35, 12.2, 0.65, item["title"], size=28, bold=True, color=(22, 56, 92))

              # 页码
              add_textbox(slide, 12.0, 7.0, 0.8, 0.25, str(idx), size=10, color=(120, 120, 120))

              img_file = image_map.get(idx)
              img_path = assets_dir / img_file if img_file else None

              if img_path and img_path.exists():
                  add_bullets(slide, 0.75, 1.35, 6.3, 5.3, item["points"])
                  slide.shapes.add_picture(str(img_path), Inches(7.35), Inches(1.35), width=Inches(5.25))
              else:
                  add_bullets(slide, 1.0, 1.45, 11.2, 4.9, item["points"])

              # 备注以小字放在底部，便于后续人工转入演讲者备注
              if item["notes"]:
                  note_text = "讲述提示：" + "；".join(item["notes"])
                  add_textbox(slide, 0.75, 6.65, 11.7, 0.35, note_text[:120], size=9, color=(120, 120, 120))

          prs.save(chinese_name)
          prs.save(english_name)

          print(f"已生成：{chinese_name}")
          print(f"已生成：{english_name}")
          print(f"页数：{len(slides)}")
          PY

      - name: Upload PPT artifact
        uses: actions/upload-artifact@v4
        with:
          name: ASEAN_PPT_draft
          path: output/*.pptx
